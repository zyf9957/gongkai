<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书签导航</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 25px 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #4361ee, #3a0ca3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #666;
            max-width: 700px;
            margin: 0 auto;
        }
        
        /* 分类容器样式 */
        .category-container {
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }
        
        .category-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .category-icon {
            font-size: 1.8rem;
            margin-right: 15px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            color: white;
        }
        
        .category-company {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
        }
        
        .category-powerbi {
            background: linear-gradient(135deg, #f9c74f, #f8961e);
        }
        
        .category-finebi {
            background: linear-gradient(135deg, #4cc9f0, #4361ee);
        }
        
        .category-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #333;
        }
        
        .category-count {
            font-size: 0.9rem;
            color: #777;
            margin-left: 10px;
        }
        
        /* 方形图标紧凑布局 */
        .bookmarks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
        }
        
        .bookmark-square {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px 10px;
            transition: all 0.2s ease;
            border: 1px solid #eaeaea;
            height: 120px;
            justify-content: space-between;
        }
        
        .bookmark-square:hover {
            background: #e9ecef;
            border-color: #4361ee;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.15);
        }
        
        .bookmark-icon-square {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            background: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
            font-size: 1.8rem; /* 增大表情图标大小 */
            overflow: hidden;
        }
        
        /* 为不同域名设置不同背景色 */
        .icon-emoji {
            font-size: 1.8rem;
            line-height: 1;
        }
        
        /* 图标背景颜色 */
        .icon-bg-blue { background: linear-gradient(135deg, #4361ee, #3a0ca3); color: white; }
        .icon-bg-orange { background: linear-gradient(135deg, #f9c74f, #f8961e); color: white; }
        .icon-bg-green { background: linear-gradient(135deg, #4cc9f0, #4361ee); color: white; }
        .icon-bg-purple { background: linear-gradient(135deg, #9d4edd, #560bad); color: white; }
        .icon-bg-red { background: linear-gradient(135deg, #f72585, #b5179e); color: white; }
        .icon-bg-teal { background: linear-gradient(135deg, #38b000, #2d936c); color: white; }
        
        .bookmark-name-square {
            font-weight: 600;
            font-size: 0.9rem;
            color: #333;
            text-align: center;
            line-height: 1.3;
            max-height: 36px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #777;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .bookmarks-grid {
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
                gap: 15px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .category-container {
                padding: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .bookmarks-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 12px;
            }
            
            .bookmark-square {
                padding: 12px 8px;
                height: 110px;
            }
            
            .bookmark-icon-square {
                width: 45px;
                height: 45px;
                font-size: 1.5rem;
            }
            
            .icon-emoji {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <main id="bookmarksContainer">

        </main>
        
        <footer class="footer">

    <script>
        // ============================================

        // {"name": "网站名称", "url": "https://example.com", "desc": "网站描述", "icon": "🔧"}
        // icon字段可选，如果不提供则会根据域名自动选择表情

        // 书签数据
        const bookmarks = {

                {"name": "早阳门店销售数据", "url": "https://app.powerbi.com/reportEmbed?reportId=806ad39f-aa08-49b4-8957-07278cd9cd13&autoAuth=true&ctid=994d48cd-6859-415c-946b-e2424ca28937", "desc": "Power BI门店销售报表", "icon": "📊"},
                {"name": "高德地图搜索工具", "url": "https://zyf9957.github.io/gongkai/%E9%AB%98%E5%BE%B7%E5%9C%B0%E5%9B%BE%E5%91%A8%E8%BE%B9%E6%90%9C%E7%B4%A2%E5%B7%A5%E5%85%B7.html", "icon": "🗺️"},
                {"name": "飞书文档", "url": "https://rq1cmqzk335.feishu.cn/wiki/", "icon": "📚"},
                {"name": "企微文档", "url": "https://doc.weixin.qq.com/home/space/1/i.1970325464986107.1688856301491548/all/", "icon": "📚"},
                {"name": "My工具集", "url": "http://172.16.3.16:8501/", "desc": "仅在公司可用", "icon": "📌"},
                {"name": "QGIS", "url": "https://raw.githubusercontent.com/zyf9957/gongkai/main/地图.qgz", "desc": "仅在公司可用", "icon": "🗺️"}
                // 在这里添加更多数据报表书签...
            ],
            "🏢 公司系统": [
                {"name": "网规系统", "url": "https://xsite.online/#/login", "desc": "网规系统", "icon": "📐"},
                {"name": "网规系统后台", "url": "https://datam.olmap.cn/admin/", "desc": "网规系统后台管理", "icon": "⚙️"},
                {"name": "海康云眸", "url": "https://www.hik-cloud.com/safe-center/index.html#/login/retail?type=true", "desc": "海康云眸安全中心", "icon": "📹"},
                {"name": "企迈", "url": "https://console.qmai.cn/biCenter/bivue/qmbiPage/qmbiCenter/report/1e9b6520282642a892c0b1fb9b677365?dashboardId=1e9b6520282642a892c0b1fb9b677365", "desc": "企迈BI报表中心", "icon": "📱"},
                {"name": "DMS", "url": "https://hg.zaoyangfood.cn/pages/crmhome/index.html?menu=crm-home&page=crm-home&module=modules", "desc": "早阳食品DMS系统", "icon": "🍞"},
                {"name": "九阳豆业豆联网", "url": "https://iot.doujiang.com/user/login?redirect=%2Fdashboard%2Fanalysis", "desc": "九阳豆业物联网系统", "icon": "🥛"},
                {"name": "丰收商小助", "url": "https://samcform.zjnsjk.com/#/frame/28a46865651539cdd608e4c20fbda25fc1f5b123c44f69bff0e02d17be128e5df4b8f9be45d2d9827350085a4cae195f1f68236f404b69fb", "desc": "丰收商小助表单系统", "icon": "📋"},
                {"name": "高德地图小程序", "url": "https://wia.amap.com/#/manage/maps?orgId=10012444080107938118", "desc": "高德地图管理后台", "icon": "📍"},
                {"name": "加盟商管理系统", "url": "https://jms.zaoyangfood.cn:1445/app/dashboard", "desc": "加盟商管理系统", "icon": "🤝"},
                {"name": "美团外卖商家版", "url": "https://e.waimai.meituan.com/new_fe/login_gw#/login", "desc": "美团外卖商家版登录", "icon": "🍔"},
                {"name": "饿了么商家版", "url": "https://ka.shop.ele.me/", "desc": "饿了么商家版", "icon": "🍜"}
                // 在这里添加更多公司系统书签...
            ],
            "📈 Fine BI": [
                {"name": "Fine BI", "url": "http://bi.zaoyangfood.cn:8012/webroot/decision#/analysis/own/subject/e9baf01d4d37405d846da94597981a0a/report/2dadf35b513f440aa513580dae7fab30", "desc": "Fine BI数据分析平台", "icon": "📊"},
                {"name": "Fine Datalink", "url": "http://192.168.20.27/webroot/decision/login?origin=3de63df8-08da-4bf3-ae36-87c252dd1510#home", "desc": "Fine Datalink数据连接", "icon": "🔗"}
                // 在这里添加更多Fine BI书签...
            ]
        };
        
        // 分类图标和颜色映射
        const categoryStyles = {
            "📊 数据报表": { icon: "📊", colorClass: "category-powerbi", iconClass: "fas fa-chart-bar" },
            "🏢 公司系统": { icon: "🏢", colorClass: "category-company", iconClass: "fas fa-building" },
            "📈 Fine BI": { icon: "📈", colorClass: "category-finebi", iconClass: "fas fa-chart-line" }
        };
        
        // 域名到表情图标的映射
        const domainToEmoji = {
            'powerbi.com': '📊',
            'github.com': '🐙',
            'gitlab.com': '🦊',
            'amap.com': '🗺️',
            'google.com': '🔍',
            'bing.com': '🔎',
            'baidu.com': '🐼',
            'weixin.qq.com': '💬',
            'dingtalk.com': '📌',
            'feishu.cn': '📚',
            'meituan.com': '🍔',
            'ele.me': '🍜',
            'douyin.com': '🎵',
            'bilibili.com': '📺',
            'stackoverflow.com': '❓',
            'microsoft.com': '🪟',
            'apple.com': '🍎',
            'python.org': '🐍',
            'nodejs.org': '⬢',
            'java.com': '☕',
            'mysql.com': '🐬',
            'mongodb.com': '🍃',
            'redis.io': '🔴',
            'docker.com': '🐳',
            'kubernetes.io': '⚓',
            'aws.amazon.com': '☁️',
            'azure.com': '🔷',
            'cloud.google.com': '🔶',
            'alibabacloud.com': '👨‍💼'
        };
        
        // 关键词到表情图标的映射
        const keywordToEmoji = {
            '登录': '🔐',
            '管理': '⚙️',
            '后台': '🖥️',
            '系统': '🖥️',
            '报表': '📊',
            '数据': '📈',
            '分析': '📊',
            '地图': '🗺️',
            '搜索': '🔍',
            '工具': '🔧',
            '设置': '⚙️',
            '配置': '🛠️',
            '开发': '💻',
            '代码': '💾',
            '文档': '📄',
            '帮助': '❓',
            '支持': '🆘',
            '销售': '💰',
            '财务': '💵',
            '人力': '👥',
            '资源': '📚',
            '学习': '🎓',
            '课程': '📖',
            '视频': '🎬',
            '音乐': '🎵',
            '图片': '🖼️',
            '文件': '📁',
            '云': '☁️',
            '存储': '💾',
            '网络': '🌐',
            '安全': '🔒',
            '监控': '📹',
            '邮件': '📧',
            '消息': '💬',
            '社交': '👥',
            '购物': '🛒',
            '外卖': '🍱',
            '餐饮': '🍽️',
            '旅行': '✈️',
            '酒店': '🏨',
            '交通': '🚗',
            '健康': '🏥',
            '运动': '⚽',
            '娱乐': '🎮',
            '游戏': '🎮'
        };
        
        // 获取网站表情图标
        function getWebsiteEmoji(url, name) {
            try {
                // 如果书签数据中已指定图标，则使用指定的图标
                const bookmark = bookmarksArray.find(b => b.url === url);
                if (bookmark && bookmark.icon) {
                    return bookmark.icon;
                }
                
                const domain = new URL(url).hostname;
                
                // 检查域名映射
                for (const [key, emoji] of Object.entries(domainToEmoji)) {
                    if (domain.includes(key)) {
                        return emoji;
                    }
                }
                
                // 检查关键词映射
                for (const [keyword, emoji] of Object.entries(keywordToEmoji)) {
                    if (name.includes(keyword)) {
                        return emoji;
                    }
                }
                
                // 默认图标
                return '🔗';
            } catch {
                return '🌐'; // 如果URL无效，返回默认图标
            }
        }
        
        // 获取图标背景色类名
        function getIconBgClass(url) {
            const bgClasses = ['icon-bg-blue', 'icon-bg-orange', 'icon-bg-green', 'icon-bg-purple', 'icon-bg-red', 'icon-bg-teal'];
            
            try {
                const domain = new URL(url).hostname;
                // 根据域名生成一个简单的哈希值来选择背景色
                let hash = 0;
                for (let i = 0; i < domain.length; i++) {
                    hash = domain.charCodeAt(i) + ((hash << 5) - hash);
                }
                const index = Math.abs(hash) % bgClasses.length;
                return bgClasses[index];
            } catch {
                return bgClasses[0]; // 如果URL无效，返回第一个背景色
            }
        }
        
        // 将bookmarks对象转换为数组以便查找
        const bookmarksArray = [];
        for (const category in bookmarks) {
            bookmarks[category].forEach(item => {
                bookmarksArray.push(item);
            });
        }
        
        // 渲染书签
        function renderBookmarks() {
            const container = document.getElementById('bookmarksContainer');
            container.innerHTML = '';
            
            let totalBookmarks = 0;
            
            // 遍历每个分类
            for (const [category, items] of Object.entries(bookmarks)) {
                totalBookmarks += items.length;
                
                // 获取分类样式
                let categoryStyle = categoryStyles[category] || { 
                    icon: "📁", 
                    colorClass: "category-company",
                    iconClass: "fas fa-folder"
                };
                
                // 创建分类容器
                const categoryContainer = document.createElement('div');
                categoryContainer.className = 'category-container';
                categoryContainer.innerHTML = `
                    <div class="category-header">
                        <div class="category-icon ${categoryStyle.colorClass}">
                            <i class="${categoryStyle.iconClass}"></i>
                        </div>
                        <div>
                            <div class="category-title">${category} <span class="category-count">(${items.length})</span></div>
                        </div>
                    </div>
                    <div class="bookmarks-grid">
                        ${items.map(item => {
                            const emoji = getWebsiteEmoji(item.url, item.name);
                            const bgClass = getIconBgClass(item.url);
                            return `
                                <a href="${item.url}" target="_blank" class="bookmark-square" title="${item.desc || item.name}">
                                    <div class="bookmark-icon-square ${bgClass}">
                                        <span class="icon-emoji">${emoji}</span>
                                    </div>
                                    <div class="bookmark-name-square">${item.name}</div>
                                </a>
                            `;
                        }).join('')}
                    </div>
                `;
                
                container.appendChild(categoryContainer);
            }
            
            // 更新总数
            document.getElementById('totalBookmarks').textContent = totalBookmarks;
        }
        
        // 页面加载完成后渲染书签
        document.addEventListener('DOMContentLoaded', renderBookmarks);
    </script>
</body>
</html>
